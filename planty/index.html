<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planty</title>
    <link rel="stylesheet" href="1.css">
</head>
<body>
    <main>
        <section class="sec1">
            <div class="buttons">
                <button class="button1"><img src="/img/home.png"></button>
                <button class="button1"><img src="/img/description.png"></button>
                <button class="button1"><img src="img/setting.png"></button>
            </div>
            <img src="/img/Planty.png">
            <p id="sec1text">Твой личный помощник в мире растений</p>
            <button class="sec1button"></button>
            <img src="/img/earth.png">
            <img id="mouse" src="/img/mouse.png">
            <img class="clouds" id="cloud1" src="/img/cloud.png">
            <img class="clouds" id="cloud2" src="/img/cloud.png">
            <img class="clouds" id="cloud3" src="/img/cloud.png">
            <img src="/img/flower1.png" id="flower">
            <img src="/img/flower2.png">
            <img src="/img/stone1.png">
            <img src="/img/stone2.png">
            <img src="/img/tree.png">
        </section>     
        <section class="sec2">
            <img class="clouds" id="cloud4" src="/img/cloud.png">
            <img class="clouds" id="cloud5" src="/img/cloud.png">
            <img class="clouds" id="cloud6" src="/img/cloud.png">
            <img class="clouds" id="cloud7" src="/img/cloud.png">
            <img src="/img/sec2title.png" id="sec2title">

            <div class="slider">
                <button class="sliderButtons" id="left">
                    <img src="/img/left.png">
                </button>
                <div class="sliderContainer">
                    <div class="plants">
                    </div>
                </div>
                <button class="sliderButtons" id="right">
                    <img src="/img/right.png">
                </button>
                <p id="plantName">Название</p>
            </div>
        </section>
        <section class="sec3">
            <img src="/img/gif.gif">
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
